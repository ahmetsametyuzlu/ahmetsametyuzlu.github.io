<html>
    <head>
        <title>Flex Box</title>
        <style>
            div {
                display: flex;
                background: green;
                flex-wrap: wrap;
            }

            form {
                background: yellow;
                flex: 2;
            }

            p {
                background: red;
                flex: 1;
            }
        </style>
    </head>
    <body>
        <div>
            <form>Form içeriği</form>
            <p>İçerik</p>
            <p>İçerik</p>
            <p>İçerik</p>
            <p>İçerik</p>
            <p>İçerik</p>
        </div>
    </body>
</html>
